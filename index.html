<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="logo-banner">
            <img src="odin-lined.jpg" class="logo" alt="logo">
           <h1>ODIN</h1>
           </div>
        </div>
        <div class="right">
            <div class="about">
                <p>This login form is only made for project purpose please do not enter any of your real information in any filed , thank you</p>
            </div>
            <form action="" method="post" id="myform">
                <div class="form-group">
                    <label for="name">first name</label>
                    <input type="text" id="name" name="first_name">
                </div>
                <div class="form-group">
                    <label for="last_name">last name</label>
                    <input type="text" id="last_name" name="last_name">
                </div>
                <div class="form-group">
                    <label for="mail">email</label>
                    <input id="mail" type="email" name="email" >
                </div>
                <div class="form-group">
                    <label for="phone">phone number</label>
                    <input type="tel" id="phone" name="phone" minlength="0" 
                    placeholder="+1 555-123-4567" 
                    pattern="[0-9+\-\s().]{7,25}" 
                    required>
                </div>
                <div class="form-group">
                    <label for="password">password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" 
                    id="confirm_password" 
                    name="confirm_password" 
                    required>
                </div>
                
            </form>
            <div class="down">
                    <button type="submit" form="myform">Create Account</button>
                    <div class="info">Already have an account?<a href="">login</a></div>              
            </div>
        </div>
    </div>
</body>
</html>
