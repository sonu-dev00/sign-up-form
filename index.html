<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="logo-banner">
            <img src="odin-lined.jpg" class="logo" alt="logo">
           <h1>ODIN</h1>
           </div>
        </div>
        <div class="right">
            <div class="about">
                <p>This login form is only made for project purpose please do not enter any of your real information in any filed , thank you</p>
            </div>
            <div class="forms">
                <h1>lets do it</h1>
                <div class="details">
                <form action="" method="post">
                    
                        <label for="first_name">first name</label>
                        <input type="text" id="first_name" name="first_name" >
                        <label for="last_name">last name</label>
                        <input type="text" id="last_name" name="last_name">
                    
                    
                        <label for="email">email</label>
                        <input type="email" id="email" name="email">
                        <label for="phone">phone number</label>
                        <input type="tel" 
                        name="phone" id="phone" 
                        placeholder="123-456-7890" 
                        pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" 
                        title="Please enter a valid phone number (e.g., 123-456-7890)"
                        required>
                    
                    
                        <label for="password"> password</label>
                        <input type="password" id="password" name="password" required minlength="8">
                        <label for="confirm_password">confirm password</label>
                        <input type="password" id="confirm_password" name="confirm_password" required>
                    
                </form>
                </div>
            </div>
            <div class="down">
                <footer>
                    <button type="submit" >Create Account</button>
                    <div>Already have an account?<a href="">login</a></div>
                </footer>
            </div>
        </div>
    </div>
</body>
</html>
