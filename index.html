<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="logo-banner">
            <img src="odin-lined.jpg" class="logo" alt="logo">
           <h1>ODIN</h1>
           </div>
        </div>
        <div class="right">
            <div class="about">
                <p>This login form is only made for project purpose please do not enter any of your real information in any filed , thank you</p>
            </div>
            <div class="forms">
                <h1>lets do it</h1>
                <div class="details">
                <form action="" method="post">
                    <fieldset>
                        <label for="first_name">first name</label>
                        <input type="text" id="first_name" name="first_name" >
                        <label for="last_name">last name</label>
                        <input type="text" id="last_name" name="last_name">
                    </fieldset>
                    <fieldset>
                        <label for="email">email</label>
                        <input type="email" id="email" name="email">
                        <label for="phone">Phone Number:</label>
                        <input type="tel" 
                        name="phone" id="phone" 
                        placeholder="123-456-7890" 
                        pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" 
                        title="Please enter a valid phone number (e.g., 123-456-7890)"
                        required>
                    </fieldset>
                </form>
                </div>
            </div>
            <div class="down">
                <footer></footer>
            </div>
        </div>
    </div>
</body>
</html>
